# ==============================================================
# 🎨 Tmux Configuration - Nord Theme
# ==============================================================

# True color support (tmux-256color enables italics, undercurl, strikethrough)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ==============================================================
# 🎨 Nord Color Palette
# ==============================================================
# Polar Night
nord0=#2E3440
nord1=#3B4252
nord2=#434C5E
nord3=#4C566A

# Snow Storm
nord4=#D8DEE9
nord5=#E5E9F0
nord6=#ECEFF4

# Frost
nord7=#8FBCBB
nord8=#88C0D0
nord9=#81A1C1
nord10=#5E81AC

# Aurora
nord11=#BF616A
nord12=#D08770
nord13=#EBCB8B
nord14=#A3BE8C
nord15=#B48EAD

# ==============================================================
# 🎨 Status Bar
# ==============================================================

# Status bar background/foreground
set -g status-style "bg=#3B4252,fg=#D8DEE9"

# Window status
setw -g window-status-style "bg=#3B4252,fg=#D8DEE9"
setw -g window-status-current-style "bg=#88C0D0,fg=#2E3440,bold"
setw -g window-status-activity-style "bg=#EBCB8B,fg=#2E3440"

# Window format
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# Status bar left
set -g status-left-length 30
set -g status-left "#[fg=#8FBCBB,bold] ❄ #S #[fg=#4C566A]│ "

# Status bar right
set -g status-right-length 80
set -g status-right "#[fg=#A3BE8C] %H:%M #[fg=#4C566A]│#[fg=#88C0D0] %Y-%m-%d #[fg=#4C566A]│#[fg=#B48EAD] #H "

# Status update interval
set -g status-interval 5

# ==============================================================
# 🎨 Panes
# ==============================================================

# Pane borders
set -g pane-border-style "fg=#4C566A"
set -g pane-active-border-style "fg=#88C0D0"

# Pane number display
set -g display-panes-colour "#4C566A"
set -g display-panes-active-colour "#88C0D0"

# ==============================================================
# 🎨 Messages
# ==============================================================

set -g message-style "bg=#3B4252,fg=#88C0D0,bold"
set -g message-command-style "bg=#3B4252,fg=#88C0D0"

# ==============================================================
# ⚙️  General Settings
# ==============================================================

# Enable mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# Faster command sequences
set -s escape-time 10

# Increase repeat timeout
set -g repeat-time 600

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity off

# Focus events
set -g focus-events on

# Enable OSC 52 clipboard (remote copy passthrough)
set -g set-clipboard on

# ==============================================================
# ⌨️  Key Bindings
# ==============================================================

# Remap prefix to Ctrl-a
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ==============================================================
# 📋 Copy Mode (Vim-style)
# ==============================================================

setw -g mode-keys vi

# Copy mode bindings (cross-platform clipboard)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
  "if command -v pbcopy >/dev/null; then pbcopy; elif command -v xclip >/dev/null; then xclip -selection clipboard; else cat > /dev/null; fi"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# ==============================================================
# 🎯 Additional Visual Enhancements
# ==============================================================

# Clock mode
setw -g clock-mode-colour "#88C0D0"
setw -g clock-mode-style 24

# Bell
set -g visual-bell off
set -g bell-action none

# Display time for messages
set -g display-time 2000

# ==============================================================
# 🔌 Plugins (Optional - requires TPM)
# ==============================================================

# Tmux Plugin Manager (install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore last session
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
if "test -d ~/.tmux/plugins/tpm" "run '~/.tmux/plugins/tpm/tpm'"
